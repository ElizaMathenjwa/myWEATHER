<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="src/style.css" />
  <title>myWEATHER</title>
</head>
<body>
  <div class="weather-app">
  <header>
    <form class="search-form" id="search-form">
      <input type="search" name="name" placeholder="Enter a city..."
       required
          id="search-form-input"
          class="search-form-input"
      >
      <input type="submit" value="Search" class="search-form-button" >
    </form>
    </header>
    <main>
      <div class="weather-app-data">
        <div>
      <h1 class="weather-app-city"> Paris</h1>

      <p class="weather-app-details">tuesday 13:44, scattered clouds<br/>
        humidity: <strong>65% </strong>
        wind: <strong>5.14 m/s</strong>
       
      </p>
        </div>
      <div class="weather-app-temperature-container">
        
        <div class="emoji">☀️</div>
        <div class="weather-app-temperature">12</div>
      <div class="weather-app-unit">°C</div>
        
        </div>
      </div>
    </main>
    <footer>
      <p>this project was coded by <a href="https://www.linkedin.com/in/eliza-mathenjwa">Eliza Mathenjwa</a>, is <a href="https://github.com/elizamathenjwa/myWEATHER">open sourced on github</a> and is <a href="https://myweather.elizamathenjwa.netlify.app/"> hosted on netlify </a></p>
    </footer>

    </div>



    </body>

</html>
