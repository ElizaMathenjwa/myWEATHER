<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="src/style.css" />
  <title>myWEATHER</title>
</head>
<body>
  <div class="weather-app">
  <header>
    <form class="search-form" id="search-form">
      <input type="text" name="name" placeholder="Enter your name"
       required
          id="search-form-input"
          class="search-form-input"
      >
      <input type="submit" value="Submit" class="search-form-button" >
    </form>
    </header>
    <main>
      <div class="weather-app-data">
      <h1 class="weather-app-city">Paris</h1>
      <p class="weather-app-details">tuesday 13:44, scattered clouds<br/>
        humidity: 65% wind: 5.14 m/s
        
      </p>
      <div class="weather-app-temperature-container">
        <div class="weather-app-temperature">
        <div class="emoji">☀️</div>12°C
        </div>
      </div>
    </main>
    <footer>
      <p>Created by <a href="https://www.linkedin.com/in/eliza-mathenjwa">Eliza Mathenjwa</a>, is <a href="https://github.com/elizamathenjwa/myWEATHER">open sourced on github</a> and is <a href="https://myweather.elizamathenjwa.netlify.app/"> hosted on netlify </a></p>
    </footer>

    </div>



    </body>

</html>
